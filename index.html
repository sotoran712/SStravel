<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Honeymoon Atlas 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-visual">
        <img
          src="./assets/honeymoon-planning-banner.png"
          alt="신혼여행 계획 테이블"
          class="top-visual__image"
        />
        <div class="top-visual__shade"></div>
        <div class="top-visual__content">
          <div class="top-bar">
            <div class="brand-mark" aria-label="Honeymoon Atlas">
              <span class="brand-dot"></span>
              <span>Honeymoon Atlas</span>
            </div>
            <div class="top-actions">
              <div class="status-pill" id="saveState">저장소 연결됨</div>
              <a class="top-link-button" href="./schedule.html" aria-label="정리 일정표 열기">
                <i data-lucide="calendar-days"></i>
                <span>일정표</span>
              </a>
              <button class="repo-save-button is-hidden" id="repoSaveButton" type="button">
                <i data-lucide="save"></i>
                저장하기
              </button>
            </div>
          </div>

          <div class="hero-grid">
            <section class="hero-copy">
              <p class="eyebrow">2026 신혼여행 플래너</p>
              <h1 id="heroTitle">Luna Honeymoon 2026</h1>
              <p id="heroRoute" class="route-line">Santorini · Athens · Milos</p>
            </section>

            <section class="hero-stats" aria-label="여행 요약">
              <article>
                <span>여행 기간</span>
                <strong id="summaryDates">-</strong>
              </article>
              <article>
                <span>총 예산</span>
                <strong id="summaryBudget">-</strong>
              </article>
              <article>
                <span>잔여 예산</span>
                <strong id="summaryRemaining">-</strong>
              </article>
            </section>
          </div>
        </div>
      </header>

      <main class="workspace">
        <aside class="column column-left">
          <section class="panel">
            <div class="panel-heading">
              <div>
                <p class="section-kicker">Trip</p>
                <h2>여행 기본 정보</h2>
              </div>
              <div class="heading-actions">
                <button
                  class="form-toggle-button"
                  id="toggleTripForm"
                  type="button"
                  aria-controls="tripForm"
                  aria-expanded="false"
                >
                  <i data-lucide="settings-2"></i>
                  <span>정보 수정</span>
                </button>
                <button class="icon-button" id="resetButton" type="button" aria-label="샘플로 초기화">
                  <i data-lucide="rotate-ccw"></i>
                </button>
              </div>
            </div>

            <form id="tripForm" class="form-stack collapsible-content is-collapsed">
              <label>
                <span>여행 이름</span>
                <input id="tripTitleInput" name="title" required />
              </label>
              <label>
                <span>커플 이름</span>
                <input id="coupleInput" name="couple" required />
              </label>
              <label>
                <span>목적지</span>
                <input id="routeInput" name="route" required />
              </label>
              <div class="field-grid">
                <label>
                  <span>출발일</span>
                  <input id="startDateInput" name="startDate" type="date" required />
                </label>
                <label>
                  <span>도착일</span>
                  <input id="endDateInput" name="endDate" type="date" required />
                </label>
              </div>
              <label>
                <span>전체 예산</span>
                <input id="budgetInput" name="budget" type="number" min="0" step="1" required />
              </label>
              <button class="primary-button" type="submit">
                <i data-lucide="save"></i>
                저장
              </button>
            </form>
          </section>

          <section class="panel budget-panel">
            <div class="panel-heading">
              <div>
                <p class="section-kicker">Budget</p>
                <h2>예산 현황</h2>
              </div>
              <span id="budgetHealth" class="budget-health">-</span>
            </div>

            <div class="budget-meter" aria-label="예산 사용률">
              <div id="budgetBar"></div>
            </div>

            <div class="budget-grid">
              <article>
                <span>사용 금액</span>
                <strong id="spentAmount">-</strong>
              </article>
              <article>
                <span>예정 금액</span>
                <strong id="plannedAmount">-</strong>
              </article>
            </div>

            <div id="categoryBreakdown" class="breakdown-list"></div>
          </section>
        </aside>

        <section class="planner-board">
          <div class="board-toolbar">
            <div>
              <p class="section-kicker">Itinerary</p>
              <h2>날짜별 계획</h2>
            </div>
            <div class="toolbar-actions">
              <div class="search-box">
                <i data-lucide="search"></i>
                <input id="searchInput" placeholder="장소, 일정, 주소" />
              </div>
              <button class="secondary-button" id="clearFilterButton" type="button">
                <i data-lucide="x"></i>
                필터 해제
              </button>
            </div>
          </div>

          <div id="dayTabs" class="day-tabs" aria-label="날짜 필터"></div>

          <section class="panel inline-editor">
            <div class="panel-heading">
              <div>
                <p class="section-kicker">Entry</p>
                <h2 id="itineraryFormTitle">일정 추가</h2>
              </div>
              <div class="heading-actions">
                <button
                  class="form-toggle-button"
                  id="toggleItineraryForm"
                  type="button"
                  aria-controls="itineraryForm"
                  aria-expanded="false"
                >
                  <i data-lucide="plus"></i>
                  <span>일정 입력</span>
                </button>
                <button class="icon-button is-hidden" id="cancelEditButton" type="button" aria-label="일정 수정 취소">
                  <i data-lucide="x"></i>
                </button>
              </div>
            </div>

            <form id="itineraryForm" class="form-stack collapsible-content is-collapsed">
              <div class="field-grid three">
                <label>
                  <span>날짜</span>
                  <input id="entryDateInput" name="date" type="date" required />
                </label>
                <label>
                  <span>시간</span>
                  <input id="entryTimeInput" name="time" type="time" required />
                </label>
                <label>
                  <span>분류</span>
                  <select id="entryTypeInput" name="type">
                    <option value="flight">항공권</option>
                    <option value="stay">숙소</option>
                    <option value="food">식사</option>
                    <option value="tour">투어</option>
                    <option value="transport">이동</option>
                    <option value="shopping">쇼핑</option>
                    <option value="etc">기타</option>
                  </select>
                </label>
              </div>
              <div class="field-grid">
                <label>
                  <span>일정 이름</span>
                  <input id="entryTitleInput" name="title" required />
                </label>
                <label>
                  <span>목적지</span>
                  <input id="entryDestinationInput" name="destination" required />
                </label>
              </div>
              <label>
                <span>Google Maps 주소</span>
                <input id="entryAddressInput" name="address" required />
              </label>
              <div class="field-grid three">
                <label>
                  <span>예산 금액</span>
                  <input id="entryBudgetInput" name="budget" type="number" min="0" step="1" />
                </label>
                <label>
                  <span>사용 금액</span>
                  <input id="entrySpentInput" name="spent" type="number" min="0" step="1" />
                </label>
                <label>
                  <span>상태</span>
                  <select id="entryStatusInput" name="status">
                    <option value="planned">예정</option>
                    <option value="reserved">예약</option>
                    <option value="paid">결제</option>
                  </select>
                </label>
              </div>
              <label>
                <span>메모</span>
                <textarea id="entryNoteInput" name="note" rows="3"></textarea>
              </label>
              <button class="primary-button" type="submit">
                <i data-lucide="plus"></i>
                <span id="itinerarySubmitLabel">일정 추가</span>
              </button>
            </form>
          </section>

          <div id="itineraryList" class="itinerary-list"></div>
        </section>

        <aside class="column column-right">
          <section class="panel">
            <div class="panel-heading">
              <div>
                <p class="section-kicker">Stay</p>
                <h2>숙소</h2>
              </div>
              <div class="heading-actions">
                <button
                  class="form-toggle-button"
                  id="toggleStayForm"
                  type="button"
                  aria-controls="stayForm"
                  aria-expanded="false"
                >
                  <i data-lucide="plus"></i>
                  <span>숙소 입력</span>
                </button>
                <button class="icon-button is-hidden" id="cancelStayEditButton" type="button" aria-label="숙소 수정 취소">
                  <i data-lucide="x"></i>
                </button>
              </div>
            </div>

            <div id="stayList" class="stay-list"></div>

            <form id="stayForm" class="form-stack compact-form collapsible-content is-collapsed">
              <label>
                <span>숙소 이름</span>
                <input id="stayNameInput" required />
              </label>
              <label>
                <span>주소</span>
                <input id="stayAddressInput" required />
              </label>
              <div class="field-grid">
                <label>
                  <span>체크인</span>
                  <input id="stayCheckInInput" type="date" required />
                </label>
                <label>
                  <span>체크아웃</span>
                  <input id="stayCheckOutInput" type="date" required />
                </label>
              </div>
              <div class="field-grid">
                <label>
                  <span>예산</span>
                  <input id="stayBudgetInput" type="number" min="0" step="1" />
                </label>
                <label>
                  <span>사용</span>
                  <input id="staySpentInput" type="number" min="0" step="1" />
                </label>
              </div>
              <button class="secondary-button fill" type="submit">
                <i data-lucide="hotel"></i>
                <span id="staySubmitLabel">숙소 추가</span>
              </button>
            </form>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <div>
                <p class="section-kicker">Flight</p>
                <h2>항공권</h2>
              </div>
              <div class="heading-actions">
                <button
                  class="form-toggle-button"
                  id="toggleFlightForm"
                  type="button"
                  aria-controls="flightForm"
                  aria-expanded="false"
                >
                  <i data-lucide="plus"></i>
                  <span>항공권 입력</span>
                </button>
                <button class="icon-button is-hidden" id="cancelFlightEditButton" type="button" aria-label="항공권 수정 취소">
                  <i data-lucide="x"></i>
                </button>
              </div>
            </div>

            <div id="flightList" class="flight-list"></div>

            <form id="flightForm" class="form-stack compact-form collapsible-content is-collapsed">
              <div class="field-grid">
                <label>
                  <span>항공사</span>
                  <input id="flightAirlineInput" required />
                </label>
                <label>
                  <span>편명</span>
                  <input id="flightNumberInput" placeholder="KE901" />
                </label>
              </div>
              <label>
                <span>구간</span>
                <input id="flightRouteInput" placeholder="ICN → ATH" required />
              </label>
              <div class="field-grid">
                <label>
                  <span>출발일</span>
                  <input id="flightDateInput" type="date" required />
                </label>
                <label>
                  <span>예약번호</span>
                  <input id="flightBookingInput" placeholder="선택 입력" />
                </label>
              </div>
              <div class="field-grid">
                <label>
                  <span>예산</span>
                  <input id="flightBudgetInput" type="number" min="0" step="1" />
                </label>
                <label>
                  <span>사용</span>
                  <input id="flightSpentInput" type="number" min="0" step="1" />
                </label>
              </div>
              <button class="secondary-button fill" type="submit">
                <i data-lucide="plane"></i>
                <span id="flightSubmitLabel">항공권 추가</span>
              </button>
            </form>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <div>
                <p class="section-kicker">Checklist</p>
                <h2>준비물</h2>
              </div>
              <span id="checklistCount" class="tiny-count">0/0</span>
            </div>
            <div id="checklistList" class="checklist-list"></div>
            <form id="checklistForm" class="mini-form">
              <input id="checklistInput" placeholder="새 준비물" />
              <button class="icon-button dark" type="submit" aria-label="준비물 추가">
                <i data-lucide="plus"></i>
              </button>
            </form>
          </section>

          <section class="panel github-panel">
            <div class="panel-heading">
              <div>
                <p class="section-kicker">GitHub</p>
                <h2>저장소 연결</h2>
              </div>
              <div class="heading-actions">
                <button
                  class="form-toggle-button"
                  id="toggleGithubFields"
                  type="button"
                  aria-controls="githubConnectionFields"
                  aria-expanded="false"
                >
                  <i data-lucide="key-round"></i>
                  <span>연결 정보</span>
                </button>
                <button class="icon-button" id="openPagesButton" type="button" aria-label="GitHub Pages 열기">
                  <i data-lucide="external-link"></i>
                </button>
              </div>
            </div>

            <div id="githubConnectionFields" class="collapsible-content is-collapsed">
              <form id="githubForm" class="form-stack compact-form">
                <label>
                  <span>저장소 URL</span>
                  <input id="repoUrlInput" placeholder="https://github.com/name/repo" readonly />
                </label>
                <div class="field-grid">
                  <label>
                    <span>브랜치</span>
                    <input id="branchInput" readonly />
                  </label>
                  <label>
                    <span>데이터 파일</span>
                    <input id="dataPathInput" readonly />
                  </label>
                </div>
                <button class="secondary-button fill" type="submit">
                  <i data-lucide="github"></i>
                  자동 연결됨
                </button>
              </form>

              <form id="githubTokenForm" class="form-stack compact-form token-form">
                <label>
                  <span>GitHub 토큰</span>
                  <input
                    id="githubTokenInput"
                    type="password"
                    autocomplete="off"
                    spellcheck="false"
                    placeholder="Fine-grained token"
                  />
                </label>
                <div class="token-actions">
                  <button class="secondary-button fill" type="submit">
                    <i data-lucide="key-round"></i>
                    토큰 연결
                  </button>
                  <button class="ghost-button" id="clearTokenButton" type="button">
                    <i data-lucide="shield-x"></i>
                    지우기
                  </button>
                </div>
                <p class="token-status" id="tokenStatus">토큰은 이 브라우저 탭에서만 보관됩니다.</p>
              </form>
            </div>

            <div class="github-actions">
              <button class="ghost-button" id="downloadJsonButton" type="button">
                <i data-lucide="download"></i>
                JSON
              </button>
              <button class="ghost-button" id="downloadMarkdownButton" type="button">
                <i data-lucide="file-text"></i>
                README
              </button>
              <button class="ghost-button" id="copyMarkdownButton" type="button">
                <i data-lucide="copy"></i>
                복사
              </button>
              <button class="ghost-button" id="loadRemoteButton" type="button">
                <i data-lucide="cloud-download"></i>
                불러오기
              </button>
            </div>

            <label class="import-control">
              <i data-lucide="upload"></i>
              <span>JSON 가져오기</span>
              <input id="importJsonInput" type="file" accept="application/json,.json" />
            </label>
          </section>
        </aside>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
